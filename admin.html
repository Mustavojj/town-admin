<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GRAM TOWN - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-container">
        <div class="login-logo">
            <img src="https://i.ibb.co/TBhtwyMg/e37282e92d9e.jpg" alt="Logo">
        </div>
        <h1>Admin Panel</h1>
        <p class="login-sub">Enter password to access</p>
        <div class="login-form">
            <input type="password" id="login-password" class="login-input" placeholder="Enter password..." onkeydown="if(event.key==='Enter') login()">
            <button class="login-btn" onclick="login()"><i class="fas fa-arrow-right"></i> Login</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <img src="https://i.ibb.co/TBhtwyMg/e37282e92d9e.jpg" class="header-logo" alt="Logo">
                <h1><i class="fas fa-crown" style="color:var(--primary);-webkit-text-fill-color:var(--primary);"></i> Admin Panel</h1>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card"><div class="value" id="stat-users">-</div><div class="label">Total Users</div></div>
            <div class="stat-card"><div class="value" id="stat-withdrawals">-</div><div class="label">Total Withdrawals</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <div class="tab active" data-tab="users"><i class="fas fa-users"></i> Users</div>
            <div class="tab" data-tab="tasks"><i class="fas fa-tasks"></i> Tasks</div>
            <div class="tab" data-tab="withdrawals"><i class="fas fa-arrow-up-right-from-square"></i> Withdrawals</div>
            <div class="tab" data-tab="promo"><i class="fas fa-ticket"></i> Promo Codes</div>
            <div class="tab" data-tab="notifications"><i class="fas fa-bell"></i> Notifications</div>
        </div>

        <!-- USERS TAB -->
        <div class="tab-content active" id="tab-users">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-search"></i> Search User</div>
                <div class="search-row">
                    <input class="form-control" id="user-search-input" placeholder="Enter User ID or Username..." type="text">
                    <button class="btn btn-primary" id="user-search-btn"><i class="fas fa-search"></i> Search</button>
                </div>
                <div id="user-result"></div>
            </div>
        </div>

        <!-- TASKS TAB -->
        <div class="tab-content" id="tab-tasks">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-filter"></i> Filter Tasks</div>
                <div class="search-row">
                    <input class="form-control" id="task-search-owner" placeholder="Filter by Owner ID..." type="number">
                    <select class="form-control" id="task-search-status" style="width:auto;min-width:120px;">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <select class="form-control" id="task-search-creator" style="width:auto;min-width:120px;">
                        <option value="">All Creators</option>
                        <option value="admin">Admin Created</option>
                        <option value="user">User Created</option>
                    </select>
                    <button class="btn btn-primary" id="task-search-btn"><i class="fas fa-search"></i> Search</button>
                </div>
            </div>

            <!-- Create Task Form -->
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Create Task</div>
                <div class="grid-2">
                    <div class="form-group"><label>Task Name</label><input class="form-control" id="task-create-name" placeholder="Task name"></div>
                    <div class="form-group"><label>Task URL</label><input class="form-control" id="task-create-url" placeholder="https://..."></div>
                    <div class="form-group"><label>Description</label><input class="form-control" id="task-create-desc" placeholder="Description"></div>
                    <div class="form-group"><label>Category</label>
                        <select class="form-control" id="task-create-category">
                            <option value="social">Social</option>
                            <option value="partner">Partner</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Reward GRAM</label><input class="form-control" id="task-create-gram" type="number" step="0.0001" value="0.0001"></div>
                    <div class="form-group"><label>Reward Games</label><input class="form-control" id="task-create-games" type="number" step="1" value="1"></div>
                    <div class="form-group"><label>Max Completions</label><input class="form-control" id="task-create-max" type="number" value="100"></div>
                </div>
                <button class="btn btn-primary" id="task-create-btn"><i class="fas fa-plus"></i> Create Task</button>
            </div>

            <div id="tasks-container"></div>
        </div>

        <!-- WITHDRAWALS TAB -->
        <div class="tab-content" id="tab-withdrawals">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-filter"></i> Filter Withdrawals</div>
                <div class="search-row">
                    <input class="form-control" id="withdrawal-search-user" placeholder="Filter by User ID..." type="number">
                    <select class="form-control" id="withdrawal-search-status" style="width:auto;min-width:120px;">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <button class="btn btn-primary" id="withdrawal-search-btn"><i class="fas fa-search"></i> Search</button>
                </div>
            </div>
            <div id="withdrawals-container"></div>
        </div>

        <!-- PROMO TAB -->
        <div class="tab-content" id="tab-promo">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Create Promo Code</div>
                <div class="grid-2">
                    <div class="form-group"><label>Code</label>
                        <div class="flex">
                            <input class="form-control" id="promo-code" placeholder="Enter code or generate">
                            <button class="btn btn-outline" id="promo-generate-btn" style="flex-shrink:0;"><i class="fas fa-dice"></i> Gen</button>
                        </div>
                    </div>
                    <div class="form-group"><label>Reward Amount</label><input class="form-control" id="promo-reward" type="number" step="0.0001" value="0.001"></div>
                    <div class="form-group"><label>Reward Type</label>
                        <select class="form-control" id="promo-type"><option value="gram">GRAM</option><option value="games">Games</option></select>
                    </div>
                    <div class="form-group"><label>Max Uses</label><input class="form-control" id="promo-max-uses" type="number" value="999999"></div>
                </div>
                <button class="btn btn-primary" id="promo-create-btn"><i class="fas fa-plus"></i> Create Promo</button>
            </div>
            <div id="promo-container"></div>
        </div>

        <!-- NOTIFICATIONS TAB -->
        <div class="tab-content" id="tab-notifications">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-bell"></i> Send Notification</div>
                <div class="grid-2">
                    <div class="form-group"><label>Target</label>
                        <select class="form-control" id="notif-target">
                            <option value="all">All Users</option>
                            <option value="single">Single User</option>
                        </select>
                    </div>
                    <div class="form-group" id="notif-user-group" style="display:none;">
                        <label>User ID</label>
                        <input class="form-control" id="notif-user-id" type="number" placeholder="Enter User ID">
                    </div>
                </div>
                <div class="form-group">
                    <label>Message (HTML supported)</label>
                    <textarea class="form-control" id="notif-message" placeholder="Enter your message with HTML tags..."></textarea>
                </div>
                <div class="form-group">
                    <label>Preview</label>
                    <div class="notif-preview" id="notif-preview">Your message will appear here</div>
                </div>
                <div class="form-group">
                    <label>Buttons</label>
                    <div class="grid-2">
                        <input class="form-control" id="notif-btn-name" placeholder="Button Name">
                        <input class="form-control" id="notif-btn-url" placeholder="Button URL">
                    </div>
                    <button class="btn btn-outline btn-sm mt-8" id="notif-add-btn"><i class="fas fa-plus"></i> Add Button</button>
                    <div id="notif-buttons-list" class="mt-8 flex flex-wrap" style="gap:8px;"></div>
                </div>
                <button class="btn btn-primary" id="notif-send-btn"><i class="fas fa-paper-plane"></i> Send Notification</button>
                <div class="mt-12" id="notif-progress" style="display:none;">
                    <div class="text-muted">Sending...</div>
                    <div class="progress-bar"><div class="progress-fill" id="notif-progress-fill" style="width:0%"></div></div>
                    <div class="text-muted mt-8" id="notif-status-text"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
const API_URL = 'https://town-admin-production.up.railway.app/api';
let adminPassword = localStorage.getItem('admin_password') || '12345';
let notifButtons = [];
let loginAttempts = 0;
let isLocked = false;

// ===== TABS =====
document.addEventListener('DOMContentLoaded', function() {
    var tabs = document.querySelectorAll('.tab');
    var contents = document.querySelectorAll('.tab-content');
    
    tabs.forEach(function(tab) {
        tab.addEventListener('click', function(e) {
            tabs.forEach(function(t) { t.classList.remove('active'); });
            contents.forEach(function(c) { c.classList.remove('active'); });
            this.classList.add('active');
            var tabId = this.getAttribute('data-tab');
            var content = document.getElementById('tab-' + tabId);
            if (content) content.classList.add('active');
            if (tabId === 'users') loadUsers();
            if (tabId === 'tasks') loadTasks();
            if (tabId === 'withdrawals') loadWithdrawals();
            if (tabId === 'promo') loadPromoCodes();
        });
    });
});

function login() {
    if (isLocked) {
        document.getElementById('login-error').textContent = 'Too many failed attempts. Try again later.';
        return;
    }
    const input = document.getElementById('login-password');
    const error = document.getElementById('login-error');
    if (input.value === adminPassword) {
        loginAttempts = 0;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
    } else {
        loginAttempts++;
        error.textContent = 'Wrong password! (Attempt ' + loginAttempts + '/5)';
        input.value = '';
        input.focus();
        if (loginAttempts >= 5) {
            isLocked = true;
            error.textContent = 'Too many failed attempts. Locked for 5 minutes.';
            setTimeout(function() {
                isLocked = false;
                loginAttempts = 0;
                error.textContent = '';
            }, 300000);
        }
    }
}

function toast(message, type) {
    type = type || 'info';
    var container = document.getElementById('toast-container');
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = message;
    container.appendChild(el);
    setTimeout(function() {
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 300);
    }, 3500);
}

async function apiCall(endpoint, data) {
    data = data || {};
    try {
        var response = await fetch(API_URL + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        var result = await response.json();
        if (!result.success) {
            toast(result.error || 'Request failed', 'error');
            return null;
        }
        return result;
    } catch (e) {
        toast('Network error: ' + e.message, 'error');
        return null;
    }
}

function initApp() {
    loadStats();
    loadUsers();
    loadTasks();
    loadWithdrawals();
    loadPromoCodes();
    setupEventListeners();
    setInterval(loadStats, 30000);
}

function setupEventListeners() {
    document.getElementById('user-search-btn').addEventListener('click', loadUsers);
    document.getElementById('task-search-btn').addEventListener('click', loadTasks);
    document.getElementById('withdrawal-search-btn').addEventListener('click', loadWithdrawals);
    document.getElementById('promo-generate-btn').addEventListener('click', generatePromo);
    document.getElementById('promo-create-btn').addEventListener('click', createPromo);
    document.getElementById('notif-target').addEventListener('change', toggleNotifUser);
    document.getElementById('notif-add-btn').addEventListener('click', addNotifButton);
    document.getElementById('notif-send-btn').addEventListener('click', sendNotification);
    document.getElementById('notif-message').addEventListener('input', updatePreview);
    document.getElementById('task-create-btn').addEventListener('click', createTask);
}

async function loadStats() {
    var result = await apiCall('/admin/stats');
    if (result) {
        document.getElementById('stat-users').textContent = result.data.totalUsers;
        document.getElementById('stat-withdrawals').textContent = result.data.totalWithdrawals.toFixed(4) || '0';
    }
}

async function loadUsers() {
    var query = document.getElementById('user-search-input').value.trim();
    if (!query) { toast('Enter user ID or username', 'warning'); return; }
    var isNumber = !isNaN(query);
    var result = await apiCall('/admin/users/search', { userId: isNumber ? parseInt(query) : query });
    var container = document.getElementById('user-result');
    if (result && result.data) {
        var u = result.data;
        var status = u.state === 'ban' ? 'Banned' : 'Active';
        var statusClass = u.state === 'ban' ? 'badge-rejected' : 'badge-active';
        container.innerHTML = '<div class="user-card"><div class="user-card-header"><span class="user-id">#' + u.id + '</span><span class="badge ' + statusClass + '">' + status + '</span></div><div class="user-card-grid"><div class="user-card-item"><span class="label">Balance (GRAM)</span><span class="value">' + (u.gram_balance || '0') + '</span></div><div class="user-card-item"><span class="label">Balance (Games)</span><span class="value">' + (u.games_balance || '0') + '</span></div><div class="user-card-item"><span class="label">Referrals</span><span class="value">' + (u.total_referrals || '0') + '</span></div><div class="user-card-item"><span class="label">Active Referrals</span><span class="value">' + (u.active_referrals || '0') + '</span></div><div class="user-card-item"><span class="label">Total Earnings (GRAM)</span><span class="value">' + (u.total_earnings?.gram || '0') + '</span></div><div class="user-card-item"><span class="label">Total Earnings (Games)</span><span class="value">' + (u.total_earnings?.games || '0') + '</span></div></div><div class="user-card-actions">' + (u.state === 'active' ? '<button class="btn btn-danger btn-sm" onclick="banUser(' + u.id + ')"><i class="fas fa-ban"></i> Ban</button>' : '') + (u.state === 'ban' ? '<button class="btn btn-success btn-sm" onclick="unbanUser(' + u.id + ')"><i class="fas fa-check"></i> Unban</button>' : '') + '</div></div>';
    } else {
        container.innerHTML = '<div class="text-muted mt-8">User not found</div>';
    }
}

async function banUser(userId) {
    if (!confirm('Ban user ' + userId + '?')) return;
    var result = await apiCall('/admin/users/ban', { userId: userId });
    if (result) { toast('User banned', 'success'); loadUsers(); }
}

async function unbanUser(userId) {
    if (!confirm('Unban user ' + userId + '?')) return;
    var result = await apiCall('/admin/users/unban', { userId: userId });
    if (result) { toast('User unbanned', 'success'); loadUsers(); }
}

async function createTask() {
    var name = document.getElementById('task-create-name').value.trim();
    var url = document.getElementById('task-create-url').value.trim();
    var desc = document.getElementById('task-create-desc').value.trim();
    var category = document.getElementById('task-create-category').value;
    var rewardGram = parseFloat(document.getElementById('task-create-gram').value) || 0.0001;
    var rewardGames = parseInt(document.getElementById('task-create-games').value) || 1;
    var maxCompletions = parseInt(document.getElementById('task-create-max').value) || 100;

    if (!name) { toast('Enter task name', 'warning'); return; }
    if (!url) { toast('Enter task URL', 'warning'); return; }
    if (!desc) { toast('Enter description', 'warning'); return; }

    var result = await apiCall('/admin/tasks/create', {
        name: name,
        url: url,
        description: desc,
        category: category,
        rewardGram: rewardGram,
        rewardGames: rewardGames,
        maxCompletions: maxCompletions,
        owner: 1891231976
    });

    if (result) {
        toast('Task created!', 'success');
        document.getElementById('task-create-name').value = '';
        document.getElementById('task-create-url').value = '';
        document.getElementById('task-create-desc').value = '';
        loadTasks();
    }
}

async function loadTasks() {
    var owner = document.getElementById('task-search-owner').value;
    var status = document.getElementById('task-search-status').value;
    var creator = document.getElementById('task-search-creator').value;
    var result = await apiCall('/admin/tasks/list', { owner: owner ? parseInt(owner) : null, status: status || null, creator: creator || null });
    var container = document.getElementById('tasks-container');
    container.innerHTML = '';
    if (result && result.data) {
        result.data.forEach(function(t) {
            var statusClass = t.status === 'active' ? 'badge-active' : t.status === 'pending' ? 'badge-pending' : t.status === 'completed' ? 'badge-completed' : 'badge-rejected';
            var progress = t.max_completions > 0 ? (t.total / t.max_completions * 100) : 0;
            var isAdminTask = t.owner === 1891231976 || t.owner === 0 || t.owner === null;
            container.innerHTML += '<div class="task-card"><div class="task-card-header"><div class="task-card-info"><span class="task-id">#' + t.id + '</span><span class="task-name">' + t.name + '</span>' + (isAdminTask ? '<span class="badge badge-gram">Admin</span>' : '') + '</div><span class="badge ' + statusClass + '">' + t.status + '</span></div><div class="task-card-body"><div class="task-detail"><span class="label">Owner:</span> ' + (t.owner || 'Admin') + '</div><div class="task-detail"><span class="label">Category:</span> ' + (t.category || 'social') + '</div><div class="task-detail"><span class="label">URL:</span> <a href="' + t.url + '" target="_blank">' + t.url + '</a></div><div class="task-detail"><span class="label">Description:</span> ' + (t.description || 'N/A') + '</div><div class="task-detail"><span class="label">Rewards:</span> ' + (t.reward_gram || 0.0001) + ' GRAM + ' + (t.reward_games || 1) + ' Game</div><div class="task-progress"><div class="task-progress-bar"><div class="task-progress-fill" style="width:' + Math.min(progress, 100) + '%"></div></div><span class="task-progress-text">' + t.total + '/' + t.max_completions + '</span></div></div><div class="task-card-actions">' + (t.status === 'pending' ? '<button class="btn btn-success btn-sm" onclick="updateTask(\'' + t.id + '\',\'active\')"><i class="fas fa-check"></i> Approve</button>' : '') + (t.status === 'pending' ? '<button class="btn btn-danger btn-sm" onclick="updateTask(\'' + t.id + '\',\'rejected\')"><i class="fas fa-times"></i> Reject</button>' : '') + '<button class="btn btn-warning btn-sm" onclick="editTask(\'' + t.id + '\')"><i class="fas fa-edit"></i> Edit</button><button class="btn btn-danger btn-sm" onclick="deleteTask(\'' + t.id + '\')"><i class="fas fa-trash"></i> Delete</button></div></div>';
        });
    } else {
        container.innerHTML = '<div class="text-muted">No tasks found</div>';
    }
}

async function editTask(taskId) {
    var result = await apiCall('/admin/tasks/get', { taskId: taskId });
    if (!result || !result.data) return;
    var t = result.data;
    var name = prompt('Task Name:', t.name);
    if (name === null) return;
    var url = prompt('Task URL:', t.url);
    if (url === null) return;
    var rewardGram = prompt('Reward GRAM:', t.reward_gram || 0.0001);
    if (rewardGram === null) return;
    var rewardGames = prompt('Reward Games:', t.reward_games || 1);
    if (rewardGames === null) return;
    var result2 = await apiCall('/admin/tasks/update', { taskId: taskId, name: name, url: url, rewardGram: parseFloat(rewardGram), rewardGames: parseInt(rewardGames) });
    if (result2) { toast('Task updated!', 'success'); loadTasks(); }
}

async function updateTask(taskId, status) {
    var result = await apiCall('/admin/tasks/update-status', { taskId: taskId, status: status });
    if (result) { toast('Task ' + status, 'success'); loadTasks(); }
}

async function deleteTask(taskId) {
    if (!confirm('Delete task ' + taskId + '?')) return;
    var result = await apiCall('/admin/tasks/delete', { taskId: taskId });
    if (result) { toast('Task deleted', 'success'); loadTasks(); }
}

async function loadWithdrawals() {
    var userId = document.getElementById('withdrawal-search-user').value;
    var status = document.getElementById('withdrawal-search-status').value;
    var result = await apiCall('/admin/withdrawals/list', { userId: userId ? parseInt(userId) : null, status: status || null });
    var container = document.getElementById('withdrawals-container');
    container.innerHTML = '';
    if (result && result.data) {
        result.data.forEach(function(w) {
            var statusClass = w.status === 'completed' ? 'badge-completed' : w.status === 'pending' ? 'badge-pending' : 'badge-rejected';
            var date = new Date(w.timestamp);
            var dateStr = String(date.getDate()).padStart(2,'0') + '/' + String(date.getMonth()+1).padStart(2,'0') + '/' + date.getFullYear() + ' ' + String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0') + ' ' + (date.getHours() >= 12 ? 'PM' : 'AM');
            container.innerHTML += '<div class="withdrawal-card ' + w.status + '"><div class="withdrawal-card-header"><span class="withdrawal-id">#' + w.id + '</span><span class="withdrawal-user">User: ' + w.user_id + '</span><span class="badge ' + statusClass + '">' + w.status + '</span></div><div class="withdrawal-card-body"><div class="withdrawal-amount">' + (w.amount || '0') + ' GRAM</div><div class="withdrawal-date">' + dateStr + '</div></div><div class="withdrawal-card-actions">' + (w.status === 'pending' ? '<button class="btn btn-success btn-sm" onclick="updateWithdrawal(\'' + w.id + '\',\'completed\')"><i class="fas fa-check"></i> Approve</button>' : '') + (w.status === 'pending' ? '<button class="btn btn-danger btn-sm" onclick="updateWithdrawal(\'' + w.id + '\',\'rejected\')"><i class="fas fa-times"></i> Reject</button>' : '') + '<button class="btn btn-danger btn-sm" onclick="deleteWithdrawal(\'' + w.id + '\')"><i class="fas fa-trash"></i> Delete</button></div></div>';
        });
    } else {
        container.innerHTML = '<div class="text-muted">No withdrawals found</div>';
    }
}

async function updateWithdrawal(transactionId, status) {
    var result = await apiCall('/admin/withdrawals/update-status', { transactionId: transactionId, status: status });
    if (result) { toast('Withdrawal ' + status, 'success'); loadWithdrawals(); }
}

async function deleteWithdrawal(transactionId) {
    if (!confirm('Delete withdrawal ' + transactionId + '?')) return;
    var result = await apiCall('/admin/withdrawals/delete', { transactionId: transactionId });
    if (result) { toast('Withdrawal deleted', 'success'); loadWithdrawals(); }
}

function generatePromo() {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var code = '';
    for (var i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
    document.getElementById('promo-code').value = code;
}

async function createPromo() {
    var code = document.getElementById('promo-code').value.trim().toUpperCase();
    var reward = parseFloat(document.getElementById('promo-reward').value) || 0.001;
    var rewardType = document.getElementById('promo-type').value;
    var maxUses = parseInt(document.getElementById('promo-max-uses').value) || 999999;
    if (!code) { toast('Enter promo code', 'warning'); return; }
    var result = await apiCall('/admin/promo/create', { code: code, reward: reward, rewardType: rewardType, maxUses: maxUses });
    if (result) { toast('Promo created!', 'success'); document.getElementById('promo-code').value = ''; loadPromoCodes(); }
}

async function loadPromoCodes() {
    var result = await apiCall('/admin/promo/list');
    var container = document.getElementById('promo-container');
    container.innerHTML = '';
    if (result && result.data) {
        result.data.forEach(function(p) {
            container.innerHTML += '<div class="promo-card"><div class="promo-card-header"><span class="promo-code">' + p.code + '</span><button class="btn btn-outline btn-sm" onclick="copyText(\'' + p.code + '\')"><i class="fas fa-copy"></i></button><button class="btn btn-danger btn-sm" onclick="deletePromo(\'' + p.code + '\')"><i class="fas fa-trash"></i></button></div><div class="promo-card-body"><div class="promo-detail"><span class="label">Reward:</span> ' + p.reward + '</div><div class="promo-detail"><span class="label">Type:</span> <span class="badge ' + (p.reward_type === 'gram' ? 'badge-gram' : 'badge-games') + '">' + p.reward_type + '</span></div><div class="promo-detail"><span class="label">Used:</span> ' + (p.total || 0) + ' / ' + (p.max_uses || '∞') + '</div></div></div>';
        });
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    toast('Copied!', 'success');
}

async function deletePromo(code) {
    if (!confirm('Delete promo ' + code + '?')) return;
    var result = await apiCall('/admin/promo/delete', { code: code });
    if (result) { toast('Promo deleted', 'success'); loadPromoCodes(); }
}

function toggleNotifUser() {
    document.getElementById('notif-user-group').style.display = this.value === 'single' ? 'block' : 'none';
}

function updatePreview() {
    var message = document.getElementById('notif-message').value || 'Your message will appear here';
    document.getElementById('notif-preview').innerHTML = message;
}

function addNotifButton() {
    var name = document.getElementById('notif-btn-name').value.trim();
    var url = document.getElementById('notif-btn-url').value.trim();
    if (!name || !url) { toast('Enter button name and URL', 'warning'); return; }
    notifButtons.push({ text: name, url: url });
    renderNotifButtons();
    document.getElementById('notif-btn-name').value = '';
    document.getElementById('notif-btn-url').value = '';
}

function renderNotifButtons() {
    var container = document.getElementById('notif-buttons-list');
    var html = '';
    notifButtons.forEach(function(btn, i) {
        html += '<span class="notif-btn-tag">' + btn.text + ' <i class="fas fa-times" onclick="removeNotifButton(' + i + ')" style="cursor:pointer;margin-left:4px;"></i></span>';
    });
    container.innerHTML = html;
}

function removeNotifButton(index) {
    notifButtons.splice(index, 1);
    renderNotifButtons();
}

async function sendNotification() {
    var target = document.getElementById('notif-target').value;
    var userId = target === 'single' ? parseInt(document.getElementById('notif-user-id').value) : null;
    var message = document.getElementById('notif-message').value.trim();
    
    if (!message) { toast('Enter message', 'warning'); return; }
    if (target === 'single' && !userId) { toast('Enter user ID', 'warning'); return; }
    
    var progressDiv = document.getElementById('notif-progress');
    var progressFill = document.getElementById('notif-progress-fill');
    var statusText = document.getElementById('notif-status-text');
    progressDiv.style.display = 'block';
    progressFill.style.width = '0%';
    statusText.textContent = 'Sending...';
    
    var result = await apiCall('/admin/notifications/send', { userId: userId, message: message, buttons: notifButtons.length > 0 ? notifButtons : null, target: target });
    
    if (result) {
        progressFill.style.width = '100%';
        statusText.textContent = '✅ Sent: ' + result.sent + ' | Failed: ' + result.failed;
        toast('Sent: ' + result.sent + ', Failed: ' + result.failed, result.failed > 0 ? 'warning' : 'success');
        setTimeout(function() { progressDiv.style.display = 'none'; }, 3000);
    } else {
        statusText.textContent = '❌ Failed to send';
        progressDiv.style.display = 'none';
    }
}
</script>
</body>
</html>

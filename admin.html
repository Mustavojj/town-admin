<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GRAM TOWN - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-container">
        <div class="login-logo">
            <img src="https://i.ibb.co/TBhtwyMg/e37282e92d9e.jpg" alt="Logo">
        </div>
        <h1>Admin Panel</h1>
        <p class="login-sub">Enter password to access</p>
        <div class="login-form">
            <input type="password" id="login-password" class="login-input" placeholder="Enter password..." onkeydown="if(event.key==='Enter') login()">
            <button class="login-btn" onclick="login()"><i class="fas fa-arrow-right"></i> Login</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <img src="https://i.ibb.co/TBhtwyMg/e37282e92d9e.jpg" class="header-logo" alt="Logo">
                <h1><i class="fas fa-crown" style="color:var(--primary);-webkit-text-fill-color:var(--primary);"></i> Admin Panel</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card"><div class="value" id="stat-users">-</div><div class="label">Total Users</div></div>
            <div class="stat-card"><div class="value" id="stat-withdrawals">-</div><div class="label">Total Withdrawals</div></div>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs" id="admin-tabs">
            <button class="admin-tab-btn active" data-tab="users"><i class="fas fa-users"></i> Users</button>
            <button class="admin-tab-btn" data-tab="tasks"><i class="fas fa-tasks"></i> Tasks</button>
            <button class="admin-tab-btn" data-tab="withdrawals"><i class="fas fa-arrow-up-right-from-square"></i> Withdrawals</button>
            <button class="admin-tab-btn" data-tab="promo"><i class="fas fa-ticket"></i> Promo Codes</button>
            <button class="admin-tab-btn" data-tab="notifications"><i class="fas fa-bell"></i> Notifications</button>
        </div>

        <!-- USERS TAB -->
        <div class="admin-tab-content active" id="tab-users">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-search"></i> Search User</div>
                <div class="search-row">
                    <input class="form-control" id="user-search-input" placeholder="Enter User ID..." type="number">
                    <button class="btn btn-primary" id="user-search-btn"><i class="fas fa-search"></i> Search</button>
                </div>
                <div id="user-result"></div>
            </div>
        </div>

        <!-- TASKS TAB -->
        <div class="admin-tab-content" id="tab-tasks">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-filter"></i> Filter Tasks</div>
                <div class="search-row">
                    <input class="form-control" id="task-search-owner" placeholder="Filter by Owner ID..." type="number">
                    <select class="form-control" id="task-search-status" style="width:auto;min-width:120px;">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <button class="btn btn-primary" id="task-search-btn"><i class="fas fa-search"></i> Search</button>
                </div>
            </div>
            <div id="tasks-container"></div>
        </div>

        <!-- WITHDRAWALS TAB -->
        <div class="admin-tab-content" id="tab-withdrawals">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-filter"></i> Filter Withdrawals</div>
                <div class="search-row">
                    <input class="form-control" id="withdrawal-search-user" placeholder="Filter by User ID..." type="number">
                    <select class="form-control" id="withdrawal-search-status" style="width:auto;min-width:120px;">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <button class="btn btn-primary" id="withdrawal-search-btn"><i class="fas fa-search"></i> Search</button>
                </div>
            </div>
            <div id="withdrawals-container"></div>
        </div>

        <!-- PROMO TAB -->
        <div class="admin-tab-content" id="tab-promo">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Create Promo Code</div>
                <div class="grid-2">
                    <div class="form-group"><label>Code</label>
                        <div class="flex">
                            <input class="form-control" id="promo-code" placeholder="Enter code or generate">
                            <button class="btn btn-outline" id="promo-generate-btn" style="flex-shrink:0;"><i class="fas fa-dice"></i> Gen</button>
                        </div>
                    </div>
                    <div class="form-group"><label>Reward Amount</label><input class="form-control" id="promo-reward" type="number" step="0.0001" value="0.001"></div>
                    <div class="form-group"><label>Reward Type</label>
                        <select class="form-control" id="promo-type"><option value="gram">GRAM</option><option value="games">Games</option></select>
                    </div>
                    <div class="form-group"><label>Max Uses</label><input class="form-control" id="promo-max-uses" type="number" value="999999"></div>
                </div>
                <button class="btn btn-primary" id="promo-create-btn"><i class="fas fa-plus"></i> Create Promo</button>
            </div>
            <div id="promo-container"></div>
        </div>

        <!-- NOTIFICATIONS TAB -->
        <div class="admin-tab-content" id="tab-notifications">
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-bell"></i> Send Notification</div>
                <div class="grid-2">
                    <div class="form-group"><label>Target</label>
                        <select class="form-control" id="notif-target">
                            <option value="all">All Users</option>
                            <option value="single">Single User</option>
                        </select>
                    </div>
                    <div class="form-group" id="notif-user-group" style="display:none;">
                        <label>User ID</label>
                        <input class="form-control" id="notif-user-id" type="number" placeholder="Enter User ID">
                    </div>
                </div>
                <div class="form-group">
                    <label>Message (HTML supported)</label>
                    <textarea class="form-control" id="notif-message" placeholder="Enter your message with HTML tags..."></textarea>
                </div>
                <div class="form-group">
                    <label>Buttons</label>
                    <div class="grid-2">
                        <input class="form-control" id="notif-btn-name" placeholder="Button Name">
                        <input class="form-control" id="notif-btn-url" placeholder="Button URL">
                    </div>
                    <button class="btn btn-outline btn-sm mt-8" id="notif-add-btn"><i class="fas fa-plus"></i> Add Button</button>
                    <div id="notif-buttons-list" class="mt-8 flex flex-wrap" style="gap:8px;"></div>
                </div>
                <button class="btn btn-primary" id="notif-send-btn"><i class="fas fa-paper-plane"></i> Send Notification</button>
                <div class="mt-12" id="notif-progress" style="display:none;">
                    <div class="text-muted">Sending...</div>
                    <div class="progress-bar"><div class="progress-fill" id="notif-progress-fill" style="width:0%"></div></div>
                    <div class="text-muted mt-8" id="notif-status-text"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
const API_URL = 'https://town-admin-production.up.railway.app/api';
let adminPassword = localStorage.getItem('admin_password') || '12345';
let notifButtons = [];

function login() {
    const input = document.getElementById('login-password');
    const error = document.getElementById('login-error');
    if (input.value === adminPassword) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
    } else {
        error.textContent = 'Wrong password!';
        input.value = '';
        input.focus();
    }
}

function logout() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
}

function toast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = message;
    container.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
}

async function apiCall(endpoint, data = {}) {
    try {
        const response = await fetch(`${API_URL}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        if (!result.success) {
            toast(result.error || 'Request failed', 'error');
            return null;
        }
        return result;
    } catch (e) {
        toast('Network error: ' + e.message, 'error');
        return null;
    }
}

// ===== INIT =====
function initApp() {
    loadStats();
    loadUsers();
    loadTasks();
    loadWithdrawals();
    loadPromoCodes();
    setupTabs();
    setupEventListeners();
    setInterval(loadStats, 30000);
}

function setupTabs() {
    document.querySelectorAll('#admin-tabs .admin-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#admin-tabs .admin-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            const tabId = this.dataset.tab;
            const content = document.getElementById('tab-' + tabId);
            if (content) content.classList.add('active');
            if (tabId === 'users') loadUsers();
            if (tabId === 'tasks') loadTasks();
            if (tabId === 'withdrawals') loadWithdrawals();
            if (tabId === 'promo') loadPromoCodes();
        });
    });
}

function setupEventListeners() {
    document.getElementById('user-search-btn')?.addEventListener('click', searchUser);
    document.getElementById('task-search-btn')?.addEventListener('click', loadTasks);
    document.getElementById('withdrawal-search-btn')?.addEventListener('click', loadWithdrawals);
    document.getElementById('promo-generate-btn')?.addEventListener('click', generatePromo);
    document.getElementById('promo-create-btn')?.addEventListener('click', createPromo);
    document.getElementById('notif-target')?.addEventListener('change', toggleNotifUser);
    document.getElementById('notif-add-btn')?.addEventListener('click', addNotifButton);
    document.getElementById('notif-send-btn')?.addEventListener('click', sendNotification);
}

// ===== STATS =====
async function loadStats() {
    const result = await apiCall('/admin/stats');
    if (result) {
        document.getElementById('stat-users').textContent = result.data.totalUsers;
        document.getElementById('stat-withdrawals').textContent = result.data.totalWithdrawals?.toFixed(4) || '0';
    }
}

// ===== USERS =====
async function searchUser() {
    const userId = document.getElementById('user-search-input').value.trim();
    if (!userId) { toast('Enter user ID', 'warning'); return; }
    const result = await apiCall('/admin/users/search', { userId: parseInt(userId) });
    const container = document.getElementById('user-result');
    if (result && result.data) {
        const u = result.data;
        const status = u.state === 'ban' ? 'Banned' : 'Active';
        const statusClass = u.state === 'ban' ? 'badge-rejected' : 'badge-active';
        container.innerHTML = `
            <div class="user-card">
                <div class="user-card-header">
                    <span class="user-id">#${u.id}</span>
                    <span class="badge ${statusClass}">${status}</span>
                </div>
                <div class="user-card-grid">
                    <div class="user-card-item">
                        <span class="label">Balance (GRAM)</span>
                        <span class="value">${u.gram_balance?.toFixed(6) || '0'}</span>
                    </div>
                    <div class="user-card-item">
                        <span class="label">Balance (Games)</span>
                        <span class="value">${u.games_balance || 0}</span>
                    </div>
                    <div class="user-card-item">
                        <span class="label">Referrals</span>
                        <span class="value">${u.total_referrals || 0}</span>
                    </div>
                    <div class="user-card-item">
                        <span class="label">Active Referrals</span>
                        <span class="value">${u.active_referrals || 0}</span>
                    </div>
                    <div class="user-card-item">
                        <span class="label">Total Earnings (GRAM)</span>
                        <span class="value">${u.total_earnings?.gram?.toFixed(6) || '0'}</span>
                    </div>
                    <div class="user-card-item">
                        <span class="label">Total Earnings (Games)</span>
                        <span class="value">${u.total_earnings?.games || 0}</span>
                    </div>
                </div>
                <div class="user-card-actions">
                    ${u.state === 'active' ? `<button class="btn btn-danger btn-sm" onclick="banUser(${u.id})"><i class="fas fa-ban"></i> Ban</button>` : ''}
                    ${u.state === 'ban' ? `<button class="btn btn-success btn-sm" onclick="unbanUser(${u.id})"><i class="fas fa-check"></i> Unban</button>` : ''}
                </div>
            </div>
        `;
    } else {
        container.innerHTML = '<div class="text-muted mt-8">User not found</div>';
    }
}

async function banUser(userId) {
    if (!confirm(`Ban user ${userId}?`)) return;
    const result = await apiCall('/admin/users/ban', { userId });
    if (result) { toast('User banned', 'success'); searchUser(); }
}

async function unbanUser(userId) {
    if (!confirm(`Unban user ${userId}?`)) return;
    const result = await apiCall('/admin/users/unban', { userId });
    if (result) { toast('User unbanned', 'success'); searchUser(); }
}

// ===== TASKS =====
async function loadTasks() {
    const owner = document.getElementById('task-search-owner')?.value;
    const status = document.getElementById('task-search-status')?.value;
    const result = await apiCall('/admin/tasks/list', { owner: owner ? parseInt(owner) : null, status: status || null });
    const container = document.getElementById('tasks-container');
    container.innerHTML = '';
    if (result && result.data) {
        result.data.forEach(t => {
            const statusClass = t.status === 'active' ? 'badge-active' : t.status === 'pending' ? 'badge-pending' : t.status === 'completed' ? 'badge-completed' : 'badge-rejected';
            const progress = t.max_completions > 0 ? (t.total / t.max_completions * 100) : 0;
            container.innerHTML += `
                <div class="task-card">
                    <div class="task-card-header">
                        <div class="task-card-info">
                            <span class="task-id">#${t.id}</span>
                            <span class="task-name">${t.name}</span>
                        </div>
                        <span class="badge ${statusClass}">${t.status}</span>
                    </div>
                    <div class="task-card-body">
                        <div class="task-detail"><span class="label">Owner:</span> ${t.owner || 'Admin'}</div>
                        <div class="task-detail"><span class="label">URL:</span> <a href="${t.url}" target="_blank">${t.url}</a></div>
                        <div class="task-detail"><span class="label">Description:</span> ${t.description || 'N/A'}</div>
                        <div class="task-progress">
                            <div class="task-progress-bar"><div class="task-progress-fill" style="width:${Math.min(progress, 100)}%"></div></div>
                            <span class="task-progress-text">${t.total}/${t.max_completions}</span>
                        </div>
                    </div>
                    <div class="task-card-actions">
                        ${t.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="updateTask('${t.id}','active')"><i class="fas fa-check"></i> Approve</button>` : ''}
                        ${t.status === 'pending' ? `<button class="btn btn-danger btn-sm" onclick="updateTask('${t.id}','rejected')"><i class="fas fa-times"></i> Reject</button>` : ''}
                        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `;
        });
    } else {
        container.innerHTML = '<div class="text-muted">No tasks found</div>';
    }
}

async function updateTask(taskId, status) {
    const result = await apiCall('/admin/tasks/update-status', { taskId, status });
    if (result) { toast(`Task ${status}`, 'success'); loadTasks(); }
}

async function deleteTask(taskId) {
    if (!confirm(`Delete task ${taskId}?`)) return;
    const result = await apiCall('/admin/tasks/delete', { taskId });
    if (result) { toast('Task deleted', 'success'); loadTasks(); }
}

// ===== WITHDRAWALS =====
async function loadWithdrawals() {
    const userId = document.getElementById('withdrawal-search-user')?.value;
    const status = document.getElementById('withdrawal-search-status')?.value;
    const result = await apiCall('/admin/withdrawals/list', { userId: userId ? parseInt(userId) : null, status: status || null });
    const container = document.getElementById('withdrawals-container');
    container.innerHTML = '';
    if (result && result.data) {
        result.data.forEach(w => {
            const statusClass = w.status === 'completed' ? 'badge-completed' : w.status === 'pending' ? 'badge-pending' : 'badge-rejected';
            const date = new Date(w.timestamp);
            const dateStr = `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')} ${date.getHours() >= 12 ? 'PM' : 'AM'}`;
            container.innerHTML += `
                <div class="withdrawal-card ${w.status}">
                    <div class="withdrawal-card-header">
                        <span class="withdrawal-id">#${w.id}</span>
                        <span class="withdrawal-user">User: ${w.user_id}</span>
                        <span class="badge ${statusClass}">${w.status}</span>
                    </div>
                    <div class="withdrawal-card-body">
                        <div class="withdrawal-amount">${w.amount?.toFixed(6) || '0'} GRAM</div>
                        <div class="withdrawal-date">${dateStr}</div>
                    </div>
                    <div class="withdrawal-card-actions">
                        ${w.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="updateWithdrawal('${w.id}','completed')"><i class="fas fa-check"></i> Approve</button>` : ''}
                        ${w.status === 'pending' ? `<button class="btn btn-danger btn-sm" onclick="updateWithdrawal('${w.id}','rejected')"><i class="fas fa-times"></i> Reject</button>` : ''}
                        <button class="btn btn-danger btn-sm" onclick="deleteWithdrawal('${w.id}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `;
        });
    } else {
        container.innerHTML = '<div class="text-muted">No withdrawals found</div>';
    }
}

async function updateWithdrawal(transactionId, status) {
    const result = await apiCall('/admin/withdrawals/update-status', { transactionId, status });
    if (result) { toast(`Withdrawal ${status}`, 'success'); loadWithdrawals(); }
}

async function deleteWithdrawal(transactionId) {
    if (!confirm(`Delete withdrawal ${transactionId}?`)) return;
    const result = await apiCall('/admin/withdrawals/delete', { transactionId });
    if (result) { toast('Withdrawal deleted', 'success'); loadWithdrawals(); }
}

// ===== PROMO =====
function generatePromo() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = '';
    for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
    document.getElementById('promo-code').value = code;
}

async function createPromo() {
    const code = document.getElementById('promo-code').value.trim().toUpperCase();
    const reward = parseFloat(document.getElementById('promo-reward').value) || 0.001;
    const rewardType = document.getElementById('promo-type').value;
    const maxUses = parseInt(document.getElementById('promo-max-uses').value) || 999999;
    if (!code) { toast('Enter promo code', 'warning'); return; }
    const result = await apiCall('/admin/promo/create', { code, reward, rewardType, maxUses });
    if (result) { toast('Promo created!', 'success'); document.getElementById('promo-code').value = ''; loadPromoCodes(); }
}

async function loadPromoCodes() {
    const result = await apiCall('/admin/promo/list');
    const container = document.getElementById('promo-container');
    container.innerHTML = '';
    if (result && result.data) {
        result.data.forEach(p => {
            container.innerHTML += `
                <div class="promo-card">
                    <div class="promo-card-header">
                        <span class="promo-code">${p.code}</span>
                        <button class="btn btn-outline btn-sm" onclick="copyText('${p.code}')"><i class="fas fa-copy"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="deletePromo('${p.code}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="promo-card-body">
                        <div class="promo-detail"><span class="label">Reward:</span> ${p.reward}</div>
                        <div class="promo-detail"><span class="label">Type:</span> <span class="badge ${p.reward_type === 'gram' ? 'badge-gram' : 'badge-games'}">${p.reward_type}</span></div>
                        <div class="promo-detail"><span class="label">Used:</span> ${p.total || 0} / ${p.max_uses || '∞'}</div>
                    </div>
                </div>
            `;
        });
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    toast('Copied!', 'success');
}

async function deletePromo(code) {
    if (!confirm(`Delete promo ${code}?`)) return;
    const result = await apiCall('/admin/promo/delete', { code });
    if (result) { toast('Promo deleted', 'success'); loadPromoCodes(); }
}

// ===== NOTIFICATIONS =====
function toggleNotifUser() {
    document.getElementById('notif-user-group').style.display = this.value === 'single' ? 'block' : 'none';
}

function addNotifButton() {
    const name = document.getElementById('notif-btn-name').value.trim();
    const url = document.getElementById('notif-btn-url').value.trim();
    if (!name || !url) { toast('Enter button name and URL', 'warning'); return; }
    notifButtons.push({ text: name, url: url });
    renderNotifButtons();
    document.getElementById('notif-btn-name').value = '';
    document.getElementById('notif-btn-url').value = '';
}

function renderNotifButtons() {
    const container = document.getElementById('notif-buttons-list');
    container.innerHTML = notifButtons.map((btn, i) => `
        <span class="notif-btn-tag">${btn.text} <i class="fas fa-times" onclick="removeNotifButton(${i})" style="cursor:pointer;margin-left:4px;"></i></span>
    `).join('');
}

function removeNotifButton(index) {
    notifButtons.splice(index, 1);
    renderNotifButtons();
}

async function sendNotification() {
    const target = document.getElementById('notif-target').value;
    const userId = target === 'single' ? parseInt(document.getElementById('notif-user-id').value) : null;
    const message = document.getElementById('notif-message').value.trim();
    
    if (!message) { toast('Enter message', 'warning'); return; }
    if (target === 'single' && !userId) { toast('Enter user ID', 'warning'); return; }
    
    const progressDiv = document.getElementById('notif-progress');
    const progressFill = document.getElementById('notif-progress-fill');
    const statusText = document.getElementById('notif-status-text');
    progressDiv.style.display = 'block';
    progressFill.style.width = '0%';
    statusText.textContent = 'Sending...';
    
    const result = await apiCall('/admin/notifications/send', { 
        userId, 
        message, 
        buttons: notifButtons.length > 0 ? notifButtons : null, 
        target 
    });
    
    if (result) {
        progressFill.style.width = '100%';
        statusText.textContent = `✅ Sent: ${result.sent} | Failed: ${result.failed}`;
        toast(`Sent: ${result.sent}, Failed: ${result.failed}`, result.failed > 0 ? 'warning' : 'success');
        setTimeout(() => { progressDiv.style.display = 'none'; }, 3000);
    } else {
        statusText.textContent = '❌ Failed to send';
        progressDiv.style.display = 'none';
    }
}
</script>
</body>
</html>
